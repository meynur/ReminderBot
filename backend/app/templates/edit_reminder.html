{% extends "base.html" %}
{% block title %}Редактирование{% endblock %}
{% block content %}
<section class="panel-card narrow edit-card">
  {% if reminder %}
  <div class="section-head">
    <div>
      <span class="eyebrow">Тонкая настройка</span>
      <h2>Редактирование напоминания</h2>
    </div>
    <span class="section-chip">ID {{ reminder.id }}</span>
  </div>

  <form method="post" class="stack-form">
    <label for="text">Текст</label>
    <textarea id="text" name="text" rows="5" required>{{ reminder.text }}</textarea>

    <div class="form-split">
      <div>
        <label for="next_run_at">Следующий запуск</label>
        <input id="next_run_at" name="next_run_at" type="datetime-local" value="{{ local_value }}" required />
      </div>
      <div>
        <label for="schedule_type">Повторение</label>
        <select id="schedule_type" name="schedule_type">
          <option value="once" {% if reminder.schedule_type == "once" %}selected{% endif %}>Один раз</option>
          <option value="daily" {% if reminder.schedule_type == "daily" %}selected{% endif %}>Каждый день</option>
          <option value="weekly" {% if reminder.schedule_type == "weekly" %}selected{% endif %}>Каждую неделю</option>
          <option value="monthly" {% if reminder.schedule_type == "monthly" %}selected{% endif %}>Каждый месяц</option>
        </select>
      </div>
    </div>

    <label class="checkbox-row">
      <input name="is_active" type="checkbox" {% if reminder.is_active %}checked{% endif %} />
      <span>Напоминание активно</span>
    </label>

    <div class="row-actions">
      <button type="submit" class="primary-button">Сохранить изменения</button>
      <a href="/" class="ghost-button">Вернуться в панель</a>
    </div>
  </form>
  {% else %}
  <div class="empty-state">
    <p>Напоминание не найдено.</p>
    <a href="/" class="ghost-button">Вернуться в панель</a>
  </div>
  {% endif %}
</section>
{% endblock %}
